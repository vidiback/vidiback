<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="편집을 더 쉽게, Vidiback. 자동 자막, 필터, 효과, 모션 트래킹까지 손쉽게 편집하세요.">
  <meta name="theme-color" content="#030405">
  <link rel="icon" href="./assets/icon/ic_app_logo.png">
  <title>Vidiback - 편집을 더 쉽게</title>
  <style>
    :root {
      color-scheme: dark;
      --brand: #96FF00; /* identity color: 0xFF96FF00 */
      --brand-rgb: 150, 255, 0;
      --ink: #F8FAF5;
      --muted: rgba(248, 250, 245, 0.72);
      --soft: rgba(248, 250, 245, 0.52);
      --deep: #030405;
      --glass: rgba(6, 7, 8, 0.42);
      --line: rgba(255, 255, 255, 0.14);
      --ease: cubic-bezier(.16, 1, .3, 1);
    }

    * { box-sizing: border-box; }

    html {
      min-width: 320px;
      min-height: 100%;
      background: var(--deep);
      text-size-adjust: 100%;
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      min-height: 100svh;
      overflow: hidden;
      background: var(--deep);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", Pretendard, Inter, "Segoe UI", sans-serif;
      letter-spacing: -0.015em;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    video,
    img { display: block; }

    :focus-visible {
      outline: 2px solid rgba(var(--brand-rgb), 0.96);
      outline-offset: 5px;
    }

    .screen {
      position: relative;
      isolation: isolate;
      display: grid;
      min-height: 100svh;
      overflow: hidden;
      background: #050607;
    }

    .bg-video {
      position: fixed;
      inset: 0;
      z-index: -5;
      width: 100vw;
      height: 100svh;
      object-fit: cover;
      object-position: center;
      opacity: 0;
      transform: scale(1.012);
      filter: saturate(1.06) contrast(1.05) brightness(0.82);
      transition:
        opacity 720ms var(--ease),
        transform 1200ms var(--ease),
        filter 720ms var(--ease);
      background: #050607;
    }

    .bg-video.is-active {
      opacity: 1;
      transform: scale(1);
    }

    .video-vignette,
    .content-scrim,
    .color-glow,
    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .video-vignette {
      z-index: -4;
      background:
        radial-gradient(circle at 50% 42%, rgba(0,0,0,0.03), rgba(0,0,0,0.32) 58%, rgba(0,0,0,0.78) 100%),
        linear-gradient(180deg, rgba(0,0,0,0.44) 0%, rgba(0,0,0,0.08) 40%, rgba(0,0,0,0.72) 100%);
    }

    .content-scrim {
      z-index: -3;
      background:
        linear-gradient(90deg, rgba(0,0,0,0.52) 0%, rgba(0,0,0,0.18) 34%, rgba(0,0,0,0.18) 66%, rgba(0,0,0,0.52) 100%),
        linear-gradient(180deg, rgba(0,0,0,0.18), rgba(0,0,0,0.36));
    }

    .color-glow {
      z-index: -2;
      opacity: 0.74;
      background:
        radial-gradient(circle at 50% 62%, rgba(var(--brand-rgb), 0.15), transparent 27rem),
        radial-gradient(circle at 82% 18%, rgba(var(--brand-rgb), 0.12), transparent 24rem),
        radial-gradient(circle at 13% 86%, rgba(var(--brand-rgb), 0.09), transparent 24rem);
      mix-blend-mode: screen;
    }

    .noise {
      z-index: -1;
      opacity: 0.12;
      background-image: radial-gradient(rgba(255,255,255,0.2) 0.65px, transparent 0.65px);
      background-size: 4px 4px;
      mix-blend-mode: overlay;
    }

    .topbar {
      position: fixed;
      z-index: 20;
      inset: 0 0 auto;
      display: flex;
      justify-content: flex-end;
      padding: max(22px, env(safe-area-inset-top)) max(28px, env(safe-area-inset-right)) 0 max(28px, env(safe-area-inset-left));
      pointer-events: none;
    }

    .language-switcher {
      position: relative;
      pointer-events: auto;
      color: rgba(248, 250, 245, 0.92);
      font-size: 14px;
      font-weight: 650;
      line-height: 1;
      text-shadow: 0 2px 18px rgba(0,0,0,0.44);
    }

    .language-trigger {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 36px;
      list-style: none;
      user-select: none;
      cursor: pointer;
    }

    .language-trigger::-webkit-details-marker { display: none; }

    .language-trigger::after {
      content: "";
      width: 6px;
      height: 6px;
      margin-top: -3px;
      border-right: 1.5px solid currentColor;
      border-bottom: 1.5px solid currentColor;
      transform: rotate(45deg);
      opacity: 0.82;
      transition: transform 180ms var(--ease), opacity 180ms var(--ease);
    }

    .language-switcher[open] .language-trigger::after {
      margin-top: 3px;
      transform: rotate(225deg);
      opacity: 1;
    }

    .language-menu {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      display: grid;
      min-width: 122px;
      padding: 8px;
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 14px;
      background: rgba(6, 7, 8, 0.54);
      box-shadow: 0 22px 70px rgba(0,0,0,0.34);
      backdrop-filter: blur(22px) saturate(1.15);
      -webkit-backdrop-filter: blur(22px) saturate(1.15);
      transform-origin: 100% 0;
      animation: menuIn 180ms var(--ease) both;
    }

    @keyframes menuIn {
      from { opacity: 0; transform: translateY(-5px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .language-option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 36px;
      padding: 0 10px;
      border-radius: 10px;
      color: rgba(248, 250, 245, 0.74);
      white-space: nowrap;
      transition: background 160ms var(--ease), color 160ms var(--ease);
    }

    .language-option:hover,
    .language-option:focus-visible {
      color: #fff;
      background: rgba(255,255,255,0.09);
    }

    .language-option[aria-current="true"] {
      color: var(--brand);
      background: rgba(var(--brand-rgb), 0.10);
    }

    .hero {
      position: relative;
      z-index: 5;
      display: grid;
      place-items: center;
      width: min(100%, 1180px);
      min-height: 100svh;
      margin: 0 auto;
      padding: max(96px, env(safe-area-inset-top)) 26px max(52px, env(safe-area-inset-bottom));
      text-align: center;
    }

    .hero-inner {
      display: grid;
      justify-items: center;
      width: min(100%, 800px);
      animation: heroIn 960ms var(--ease) 80ms both;
    }

    @keyframes heroIn {
      from { opacity: 0; transform: translateY(18px) scale(0.985); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .brand-lockup {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      margin-bottom: clamp(26px, 4.5vh, 44px);
      padding: 8px 14px 8px 8px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 26px;
      background: rgba(7, 8, 9, 0.34);
      box-shadow: 0 18px 58px rgba(0,0,0,0.26);
      backdrop-filter: blur(18px) saturate(1.1);
      -webkit-backdrop-filter: blur(18px) saturate(1.1);
    }

    .app-icon {
      position: relative;
      display: grid;
      place-items: center;
      width: 48px;
      height: 48px;
      overflow: hidden;
      border-radius: 15px;
      background: var(--brand);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.12) inset,
        0 14px 38px rgba(var(--brand-rgb), 0.28);
    }

    .app-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .app-icon.is-fallback::before {
      content: "V";
      color: #050607;
      font-size: 26px;
      font-weight: 900;
      letter-spacing: -0.06em;
    }

    .wordmark {
      color: #fff;
      font-size: clamp(1.3rem, 2vw, 1.55rem);
      font-weight: 760;
      letter-spacing: -0.035em;
      line-height: 1;
    }

    .headline {
      max-width: 760px;
      margin: 0;
      color: #fff;
      font-size: clamp(2.55rem, 7.2vw, 5.8rem);
      font-weight: 790;
      letter-spacing: -0.045em;
      line-height: 0.96;
      text-wrap: balance;
      text-shadow: 0 18px 70px rgba(0,0,0,0.42);
    }

    .headline span {
      display: block;
    }

    .headline span:empty {
      display: none;
    }

    .headline .accent {
      color: var(--brand);
      text-shadow:
        0 0 38px rgba(var(--brand-rgb), 0.28),
        0 18px 70px rgba(0,0,0,0.42);
    }

    .lead {
      max-width: 620px;
      margin: clamp(18px, 2.8vh, 28px) 0 0;
      color: var(--muted);
      font-size: clamp(1.02rem, 2vw, 1.2rem);
      font-weight: 540;
      letter-spacing: -0.024em;
      line-height: 1.72;
      text-wrap: balance;
      text-shadow: 0 12px 36px rgba(0,0,0,0.42);
    }

    .cta-wrap {
      display: grid;
      justify-items: center;
      gap: 12px;
      margin-top: clamp(32px, 5vh, 48px);
    }

    .google-play-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 178px;
      min-height: 58px;
      padding: 0 28px;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 999px;
      background: rgba(255,255,255,0.94);
      color: #070809;
      box-shadow:
        0 24px 68px rgba(0,0,0,0.34),
        0 0 0 8px rgba(255,255,255,0.05);
      font-size: 1.08rem;
      font-weight: 790;
      letter-spacing: -0.025em;
      transform: translateZ(0);
      transition: transform 180ms var(--ease), box-shadow 180ms var(--ease), background 180ms var(--ease);
    }

    .google-play-button:hover,
    .google-play-button:focus-visible {
      transform: translateY(-2px);
      background: #fff;
      box-shadow:
        0 28px 78px rgba(0,0,0,0.40),
        0 0 0 8px rgba(var(--brand-rgb),0.13);
    }

    .site-footer {
      position: fixed;
      z-index: 18;
      inset: auto 0 0;
      display: grid;
      justify-items: center;
      gap: 10px;
      padding: 0 max(22px, env(safe-area-inset-right)) max(22px, env(safe-area-inset-bottom)) max(22px, env(safe-area-inset-left));
      color: rgba(248, 250, 245, 0.62);
      font-size: 13px;
      font-weight: 560;
      line-height: 1.2;
      text-align: center;
      pointer-events: none;
      text-shadow: 0 8px 28px rgba(0,0,0,0.54);
    }

    .footer-links {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 9px 14px;
      pointer-events: auto;
    }

    .footer-links a {
      color: rgba(248, 250, 245, 0.72);
      transition: color 160ms var(--ease);
    }

    .footer-links a:hover,
    .footer-links a:focus-visible {
      color: #fff;
    }

    .copyright {
      margin: 0;
      color: rgba(248, 250, 245, 0.46);
    }


    @media (max-width: 720px) {
      body { letter-spacing: -0.012em; }

      .topbar {
        padding: max(18px, env(safe-area-inset-top)) max(18px, env(safe-area-inset-right)) 0 max(18px, env(safe-area-inset-left));
      }

      .language-switcher { font-size: 13px; }

      .language-menu {
        min-width: 116px;
        border-radius: 13px;
      }

      .hero {
        align-items: center;
        padding: max(88px, env(safe-area-inset-top)) 20px max(38px, env(safe-area-inset-bottom));
      }

      .brand-lockup {
        gap: 11px;
        margin-bottom: 30px;
        padding: 7px 13px 7px 7px;
        border-radius: 22px;
      }

      .app-icon {
        width: 42px;
        height: 42px;
        border-radius: 13px;
      }

      .wordmark { font-size: 1.22rem; }

      .headline {
        max-width: 360px;
        font-size: clamp(2.45rem, 12.5vw, 3.7rem);
        line-height: 1;
        letter-spacing: -0.042em;
      }

      .lead {
        max-width: 335px;
        margin-top: 18px;
        font-size: 1rem;
        line-height: 1.65;
      }

      .cta-wrap {
        margin-top: 34px;
      }

      .google-play-button {
        min-width: 168px;
        min-height: 56px;
        padding: 0 26px;
      }

      .site-footer {
        gap: 8px;
        padding-bottom: max(18px, env(safe-area-inset-bottom));
        font-size: 12px;
      }

    }

    @media (max-width: 380px) {
      .headline {
        max-width: 310px;
        font-size: clamp(2.18rem, 11vw, 3rem);
      }

      .lead {
        max-width: 300px;
        font-size: 0.94rem;
      }
    }


    @media (max-height: 680px) {
      .hero {
        padding-top: max(62px, calc(env(safe-area-inset-top) + 52px));
        padding-bottom: max(28px, calc(env(safe-area-inset-bottom) + 24px));
      }

      .brand-lockup {
        gap: 10px;
        margin-bottom: 18px;
        padding: 6px 12px 6px 6px;
      }

      .app-icon {
        width: 38px;
        height: 38px;
        border-radius: 12px;
      }

      .wordmark {
        font-size: 1.12rem;
      }

      .headline {
        font-size: clamp(2.1rem, 8vw, 3.45rem);
      }

      .lead {
        margin-top: 14px;
        font-size: 0.95rem;
        line-height: 1.5;
      }

      .cta-wrap {
        margin-top: 22px;
      }

      .google-play-button {
        min-height: 56px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.001ms !important;
        animation-duration: 0.001ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <main class="screen" aria-label="Vidiback fullscreen video preview">
    <video class="bg-video is-active" id="bgVideoA" muted playsinline autoplay preload="auto"></video>
    <video class="bg-video" id="bgVideoB" muted playsinline preload="auto"></video>
    <div class="video-vignette" aria-hidden="true"></div>
    <div class="content-scrim" aria-hidden="true"></div>
    <div class="color-glow" aria-hidden="true"></div>
    <div class="noise" aria-hidden="true"></div>

    <header class="topbar">
      <details class="language-switcher" id="languageSwitcher">
        <summary class="language-trigger" id="currentLanguage">한국어</summary>
        <nav class="language-menu" aria-label="언어 선택">
          <a class="language-option" href="?lang=ko" data-lang="ko" lang="ko" aria-current="true">한국어</a>
          <a class="language-option" href="?lang=ja" data-lang="ja" lang="ja" aria-current="false">日本語</a>
          <a class="language-option" href="?lang=en" data-lang="en" lang="en" aria-current="false">English</a>
        </nav>
      </details>
    </header>

    <section class="hero" aria-labelledby="heroTitle">
      <div class="hero-inner">
        <a class="brand-lockup" href="#" aria-label="Vidiback home">
          <span class="app-icon" aria-hidden="true">
            <img id="appLogo" src="./assets/icon/ic_app_logo.png" data-fallback-src="./assets/icon/ic_app_logo.png" alt="">
          </span>
          <span class="wordmark">Vidiback</span>
        </a>

        <h1 class="headline" id="heroTitle">
          <span data-i18n="headlineBefore">편집을 더 쉽게</span>
          <span class="accent" data-i18n="headlineAccent">Vidiback</span>
          <span data-i18n="headlineAfter"></span>
        </h1>

        <p class="lead" data-i18n="lead">
          자막·효과·필터·모션 트래킹까지 한 번에. 손쉽게 완성도 있는 영상을 만드세요.
        </p>

        <div class="cta-wrap">
          <a class="google-play-button" href="#" aria-label="Google Play에서 Vidiback 받기" data-i18n-aria="playAria">Google Play</a>
        </div>
      </div>
    </section>

    <footer class="site-footer" aria-label="Vidiback legal links">
      <nav class="footer-links" aria-label="Legal links">
        <a href="terms.html?lang=ko" data-legal-link="terms" data-i18n="termsLink">이용약관</a>
        <a href="privacy.html?lang=ko" data-legal-link="privacy" data-i18n="privacyLink">개인정보처리방침</a>
      </nav>
      <p class="copyright">© Mogrevix</p>
    </footer>
  </main>

  <script>
    (() => {
      const translations = {
        ko: {
          htmlLang: 'ko',
          label: '한국어',
          title: 'Vidiback - 편집을 더 쉽게',
          description: '편집을 더 쉽게, Vidiback. 자동 자막, 필터, 효과, 모션 트래킹까지 손쉽게 편집하세요.',
          aria: '언어 선택',
          headlineBefore: '편집을 더 쉽게',
          headlineAccent: 'Vidiback',
          headlineAfter: '',
          lead: '자막·효과·필터·모션 트래킹까지 한 번에. 손쉽게 완성도 있는 영상을 만드세요.',
          playAria: 'Google Play에서 Vidiback 받기',
          termsLink: '이용약관',
          privacyLink: '개인정보처리방침',
        },
        ja: {
          htmlLang: 'ja',
          label: '日本語',
          title: 'Vidiback - 編集をもっと簡単に',
          description: '編集をもっと簡単に、Vidiback。自動字幕、フィルター、エフェクト、モーショントラッキングまで手軽に編集できます。',
          aria: '言語を選択',
          headlineBefore: '編集をもっと簡単に',
          headlineAccent: 'Vidiback',
          headlineAfter: '',
          lead: '字幕・エフェクト・フィルター・モーショントラッキングまで一度に。手軽に完成度の高い動画を作れます。',
          playAria: 'Google PlayでVidibackを入手',
          termsLink: '利用規約',
          privacyLink: 'プライバシーポリシー',
        },
        en: {
          htmlLang: 'en',
          label: 'English',
          title: 'Vidiback - Edit Easier',
          description: 'Edit easier with Vidiback. Create with auto captions, filters, effects, and motion tracking in one flow.',
          aria: 'Select language',
          headlineBefore: 'Edit Easier',
          headlineAccent: 'Vidiback',
          headlineAfter: '',
          lead: 'Captions, effects, filters, and motion tracking in one flow. Create polished videos with less effort.',
          playAria: 'Get Vidiback on Google Play',
          termsLink: 'Terms of Use',
          privacyLink: 'Privacy Policy',
        }
      };

      const supportedLanguages = Object.keys(translations);
      const languageSwitcher = document.getElementById('languageSwitcher');
      const currentLanguage = document.getElementById('currentLanguage');
      const languageMenu = languageSwitcher.querySelector('.language-menu');
      const languageOptions = Array.from(document.querySelectorAll('[data-lang]'));
      const metaDescription = document.querySelector('meta[name="description"]');
      const textNodes = Array.from(document.querySelectorAll('[data-i18n]'));
      const ariaNodes = Array.from(document.querySelectorAll('[data-i18n-aria]'));
      const legalLinks = Array.from(document.querySelectorAll('[data-legal-link]'));

      function normalizeLanguage(value) {
        const lang = String(value || '').toLowerCase();
        if (lang.startsWith('ja') || lang === 'jp') return 'ja';
        if (lang.startsWith('en')) return 'en';
        if (lang.startsWith('ko') || lang === 'kr') return 'ko';
        return '';
      }

      function safeStorageGet(key) {
        try { return localStorage.getItem(key); }
        catch (error) { return ''; }
      }

      function safeStorageSet(key, value) {
        try { localStorage.setItem(key, value); }
        catch (error) { /* storage can be unavailable in private contexts */ }
      }

      function getInitialLanguage() {
        const params = new URLSearchParams(window.location.search);
        const fromUrl = normalizeLanguage(params.get('lang'));
        if (supportedLanguages.includes(fromUrl)) return fromUrl;

        const fromStorage = normalizeLanguage(safeStorageGet('vidiback-lang'));
        if (supportedLanguages.includes(fromStorage)) return fromStorage;

        const fromBrowser = normalizeLanguage(navigator.language);
        return supportedLanguages.includes(fromBrowser) ? fromBrowser : 'ko';
      }

      function updateUrlLanguage(lang) {
        try {
          const url = new URL(window.location.href);
          url.searchParams.set('lang', lang);
          window.history.replaceState({}, '', url.href);
        } catch (error) {
          /* URL updates are non-critical. */
        }
      }

      function applyLanguage(lang, shouldPersist = true) {
        const nextLang = supportedLanguages.includes(lang) ? lang : 'ko';
        const copy = translations[nextLang];

        document.documentElement.lang = copy.htmlLang;
        document.title = copy.title;
        if (metaDescription) metaDescription.setAttribute('content', copy.description);

        currentLanguage.textContent = copy.label;
        languageMenu.setAttribute('aria-label', copy.aria);
        languageSwitcher.setAttribute('aria-label', copy.aria);

        textNodes.forEach((node) => {
          const key = node.dataset.i18n;
          if (key && copy[key]) node.textContent = copy[key];
        });

        ariaNodes.forEach((node) => {
          const key = node.dataset.i18nAria;
          if (key && copy[key]) node.setAttribute('aria-label', copy[key]);
        });

        languageOptions.forEach((option) => {
          const isCurrent = option.dataset.lang === nextLang;
          option.setAttribute('aria-current', String(isCurrent));
        });

        legalLinks.forEach((link) => {
          const pages = {
            privacy: 'privacy.html',
            terms: 'terms.html',
          };
          const page = pages[link.dataset.legalLink] || 'terms.html';
          link.href = `${page}?lang=${nextLang}`;
        });

        if (shouldPersist) {
          safeStorageSet('vidiback-lang', nextLang);
          updateUrlLanguage(nextLang);
        }
      }

      languageOptions.forEach((option) => {
        option.addEventListener('click', (event) => {
          event.preventDefault();
          applyLanguage(option.dataset.lang);
          languageSwitcher.open = false;
        });
      });

      document.addEventListener('click', (event) => {
        if (!languageSwitcher.contains(event.target)) languageSwitcher.open = false;
      });

      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') languageSwitcher.open = false;
      });

      applyLanguage(getInitialLanguage(), false);
    })();

    (() => {
      const logo = document.getElementById('appLogo');
      if (!logo) return;

      logo.addEventListener('error', () => {
        const fallback = logo.dataset.fallbackSrc;
        if (fallback && logo.src.indexOf(fallback) === -1) {
          logo.src = fallback;
          return;
        }
        logo.hidden = true;
        logo.closest('.app-icon')?.classList.add('is-fallback');
      }, { once: false });
    })();

    (() => {
      const playlist = [
        './assets/videos/auto_caption_feature.mp4',
        './assets/videos/effect_feature.mp4',
        './assets/videos/filter_feature.mp4',
        './assets/videos/motion_tracking_feature.mp4',
        './assets/videos/cutout_feature.mp4',
        './assets/videos/sticker_feature.mp4',
        './assets/videos/text_feature.mp4',
        './assets/videos/transition_feature.mp4'
      ];

      const videos = [document.getElementById('bgVideoA'), document.getElementById('bgVideoB')];
      const END_GUARD_INTERVAL_MS = 250;
      const END_GUARD_REMAINING_SECONDS = 0.18;
      let activeLayer = 0;
      let currentIndex = -1;
      let pendingIndex = 0;
      let switching = false;
      let sourceFailures = 0;
      let loadTimer = 0;
      let endGuardTimer = 0;
      let playbackToken = 0;

      function cleanVideo(video) {
        video.dataset.cleaning = 'true';
        video.pause();
        video.removeAttribute('src');
        video.load();
      }

      function clearEndGuard() {
        window.clearInterval(endGuardTimer);
        endGuardTimer = 0;
      }

      function shouldAdvanceVideo(video) {
        if (!video) return false;
        if (video.ended) return true;
        if (!Number.isFinite(video.duration) || video.duration <= 0) return false;
        return video.duration - video.currentTime <= END_GUARD_REMAINING_SECONDS;
      }

      function startEndGuard(video, token) {
        clearEndGuard();
        endGuardTimer = window.setInterval(() => {
          if (token !== playbackToken || video !== videos[activeLayer] || switching) return;
          if (shouldAdvanceVideo(video)) {
            clearEndGuard();
            nextClip();
          }
        }, END_GUARD_INTERVAL_MS);
      }

      async function playClip(index) {
        if (!playlist.length || switching) return;

        switching = true;
        window.clearTimeout(loadTimer);
        clearEndGuard();

        const nextIndex = ((index % playlist.length) + playlist.length) % playlist.length;
        const nextLayer = currentIndex === -1 ? activeLayer : 1 - activeLayer;
        const currentLayer = activeLayer;
        const nextVideo = videos[nextLayer];
        const currentVideo = videos[currentLayer];
        pendingIndex = nextIndex;

        nextVideo.dataset.cleaning = 'false';
        nextVideo.dataset.clipIndex = String(nextIndex);
        nextVideo.classList.remove('is-active');
        nextVideo.muted = true;
        nextVideo.playsInline = true;
        nextVideo.loop = false;
        nextVideo.preload = 'auto';
        nextVideo.src = playlist[nextIndex];
        nextVideo.currentTime = 0;
        nextVideo.load();

        loadTimer = window.setTimeout(() => {
          if (switching) {
            switching = false;
            playClip(nextIndex + 1);
          }
        }, 5000);

        try {
          await nextVideo.play();
          sourceFailures = 0;
          window.clearTimeout(loadTimer);
        } catch (error) {
          window.clearTimeout(loadTimer);
          switching = false;
          sourceFailures += 1;
          if (sourceFailures < playlist.length) playClip(nextIndex + 1);
          return;
        }

        requestAnimationFrame(() => {
          nextVideo.classList.add('is-active');
          if (currentIndex !== -1 && currentLayer !== nextLayer) {
            currentVideo.classList.remove('is-active');
            window.setTimeout(() => cleanVideo(currentVideo), 760);
          }
          nextVideo.dataset.cleaning = 'false';
          if (currentVideo !== nextVideo) currentVideo.dataset.cleaning = 'true';
          activeLayer = nextLayer;
          currentIndex = nextIndex;
          switching = false;
          playbackToken += 1;
          startEndGuard(nextVideo, playbackToken);
        });
      }

      function nextClip() {
        playClip((currentIndex < 0 ? 0 : currentIndex + 1));
      }

      videos.forEach((video) => {
        video.addEventListener('ended', () => {
          if (video === videos[activeLayer]) nextClip();
        });

        video.addEventListener('error', () => {
          if (video.dataset.cleaning === 'true') return;

          const failedIndex = Number.isFinite(Number(video.dataset.clipIndex))
            ? Number(video.dataset.clipIndex)
            : pendingIndex;

          sourceFailures += 1;
          switching = false;
          if (sourceFailures < playlist.length) playClip(failedIndex + 1);
        });
      });

      ['pointerdown', 'touchstart', 'keydown'].forEach((eventName) => {
        document.addEventListener(eventName, () => {
          const activeVideo = videos[activeLayer];
          if (shouldAdvanceVideo(activeVideo)) {
            nextClip();
            return;
          }
          if (activeVideo && activeVideo.paused) activeVideo.play().catch(() => {});
        }, { once: true, passive: true });
      });

      document.addEventListener('visibilitychange', () => {
        const activeVideo = videos[activeLayer];
        if (!activeVideo) return;
        if (document.hidden) {
          activeVideo.pause();
        } else {
          if (shouldAdvanceVideo(activeVideo)) {
            nextClip();
            return;
          }
          activeVideo.play().catch(() => {});
        }
      });

      playClip(0);
      window.addEventListener('beforeunload', () => {
        window.clearTimeout(loadTimer);
        clearEndGuard();
      });
    })();
  </script>
</body>
</html>
